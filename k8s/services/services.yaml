---
# NOIP Platform Services Configuration
# Service discovery and load balancing for the NOIP platform

apiVersion: v1
kind: Service
metadata:
  name: noip-platform-service
  namespace: noip-production
  labels:
    app: noip-platform
    component: application
    service-type: internal
  annotations:
    description: "NOIP Platform Main Application Service"
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  sessionAffinity: None
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
  selector:
    app: noip-platform
    component: application

---
# Service for external API access
apiVersion: v1
kind: Service
metadata:
  name: noip-platform-api-service
  namespace: noip-production
  labels:
    app: noip-platform
    component: application
    service-type: external-api
  annotations:
    description: "NOIP Platform External API Service"
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:us-east-1:123456789012:certificate/12345678-1234-1234-1234-123456789012"
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  sessionAffinity: None
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: https
    port: 443
    targetPort: http
    protocol: TCP
  selector:
    app: noip-platform
    component: application

---
# Headless Service for StatefulSets (MongoDB)
apiVersion: v1
kind: Service
metadata:
  name: mongodb-headless
  namespace: noip-production
  labels:
    app: mongodb
    component: database
    service-type: headless
  annotations:
    description: "MongoDB Headless Service for StatefulSet"
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
  - name: mongodb
    port: 27017
    targetPort: 27017
    protocol: TCP
  selector:
    app: mongodb
    component: database

---
# MongoDB Service for client connections
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: noip-production
  labels:
    app: mongodb
    component: database
    service-type: internal
  annotations:
    description: "MongoDB Client Service"
spec:
  type: ClusterIP
  sessionAffinity: None
  ports:
  - name: mongodb
    port: 27017
    targetPort: 27017
    protocol: TCP
  selector:
    app: mongodb
    component: database

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: noip-production
  labels:
    app: redis
    component: database
    service-type: internal
  annotations:
    description: "Redis Cache Service"
spec:
  type: ClusterIP
  sessionAffinity: None
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
    protocol: TCP
  selector:
    app: redis
    component: database

---
# Monitoring Services
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: noip-monitoring
  labels:
    app: prometheus
    component: monitoring
    service-type: internal
  annotations:
    description: "Prometheus Monitoring Service"
    prometheus.io/scrape: "false"
spec:
  type: ClusterIP
  sessionAffinity: None
  ports:
  - name: http
    port: 9090
    targetPort: 9090
    protocol: TCP
  selector:
    app: prometheus
    component: monitoring

---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: noip-monitoring
  labels:
    app: grafana
    component: monitoring
    service-type: internal
  annotations:
    description: "Grafana Dashboard Service"
    prometheus.io/scrape: "false"
spec:
  type: ClusterIP
  sessionAffinity: None
  ports:
  - name: http
    port: 3000
    targetPort: 3000
    protocol: TCP
  selector:
    app: grafana
    component: monitoring

---
# Service Mesh preparation - Virtual Service (Istio)
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: noip-platform-virtual-service
  namespace: noip-production
  labels:
    app: noip-platform
    component: service-mesh
  annotations:
    description: "NOIP Platform Virtual Service for Istio"
spec:
  hosts:
  - noip-platform-service
  - noip-platform-api-service
  http:
  - match:
    - uri:
        prefix: /health
    route:
    - destination:
        host: noip-platform-service
        port:
          number: 80
    timeout: 10s
    retries:
      attempts: 3
      perTryTimeout: 5s
  - match:
    - uri:
        prefix: /api
    route:
    - destination:
        host: noip-platform-service
        port:
          number: 80
      weight: 100
    fault:
      delay:
        percentage:
          value: 0.1
        fixedDelay: 5s
    timeout: 30s
    retries:
      attempts: 3
      perTryTimeout: 10s

---
# Destination Rule for service mesh traffic management
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: noip-platform-destination-rule
  namespace: noip-production
  labels:
    app: noip-platform
    component: service-mesh
  annotations:
    description: "NOIP Platform Destination Rule for Load Balancing"
spec:
  host: noip-platform-service
  trafficPolicy:
    loadBalancer:
      simple: LEAST_CONN
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 50
        maxRequestsPerConnection: 10
        maxRetries: 3
    circuitBreaker:
      consecutiveErrors: 3
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
      minHealthPercent: 50
  subsets:
  - name: v1
    labels:
      version: v1.0.0
  - name: v2
    labels:
      version: v2.0.0

---
# Service Monitor for Prometheus
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: noip-platform-metrics
  namespace: noip-production
  labels:
    app: noip-platform
    component: monitoring
    release: prometheus
  annotations:
    description: "NOIP Platform Service Monitor for Prometheus"
spec:
  selector:
    matchLabels:
      app: noip-platform
      component: application
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
    honorLabels: true
    metricRelabelings:
    - sourceLabels: [__name__]
      regex: 'http_requests_total'
      targetLabel: __tmp_name
      replacement: 'noip_http_requests_total'
    - sourceLabels: [__tmp_name]
      regex: '(.*)'
      targetLabel: __name__
      replacement: '${1}'

---
# Service Monitor for MongoDB
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: mongodb-metrics
  namespace: noip-production
  labels:
    app: mongodb
    component: monitoring
    release: prometheus
  annotations:
    description: "MongoDB Service Monitor for Prometheus"
spec:
  selector:
    matchLabels:
      app: mongodb
      component: database
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s

---
# Service Monitor for Redis
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: redis-metrics
  namespace: noip-production
  labels:
    app: redis
    component: monitoring
    release: prometheus
  annotations:
    description: "Redis Service Monitor for Prometheus"
spec:
  selector:
    matchLabels:
      app: redis
      component: database
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s