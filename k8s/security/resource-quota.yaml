---
# Resource Quotas for NOIP Platform
# Prevent resource exhaustion and ensure fair resource usage

apiVersion: v1
kind: ResourceQuota
metadata:
  name: noip-production-quota
  namespace: noip-production
  labels:
    app: noip-platform
    component: resource-management
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    persistentvolumeclaims: "10"
    pods: "20"
    services: "10"
    secrets: "20"
    configmaps: "20"
    count/deployments.apps: "10"
    count/replicasets.apps: "20"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: noip-production-limits
  namespace: noip-production
  labels:
    app: noip-platform
    component: resource-management
spec:
  limits:
  - default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    type: Container
  - max:
      cpu: "2"
      memory: "4Gi"
    min:
      cpu: "50m"
      memory: "64Mi"
    type: Container
  - max:
      storage: "20Gi"
    min:
      storage: "1Gi"
    type: PersistentVolumeClaim

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: noip-staging-quota
  namespace: noip-staging
  labels:
    app: noip-platform
    component: resource-management
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 4Gi
    limits.cpu: "4"
    limits.memory: 8Gi
    persistentvolumeclaims: "5"
    pods: "10"
    services: "5"
    secrets: "10"
    configmaps: "10"
    count/deployments.apps: "5"
    count/replicasets.apps: "10"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: noip-staging-limits
  namespace: noip-staging
  labels:
    app: noip-platform
    component: resource-management
spec:
  limits:
  - default:
      cpu: "250m"
      memory: "256Mi"
    defaultRequest:
      cpu: "50m"
      memory: "64Mi"
    type: Container
  - max:
      cpu: "1"
      memory: "2Gi"
    min:
      cpu: "25m"
      memory: "32Mi"
    type: Container