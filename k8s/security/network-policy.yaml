---
# Network Policies for NOIP Platform
# Zero-trust networking with micro-segmentation

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: noip-platform-network-policy
  namespace: noip-production
  labels:
    app: noip-platform
    component: security
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow traffic from within the same namespace
  - from:
    - namespaceSelector:
        matchLabels:
          name: noip-production
    - namespaceSelector:
        matchLabels:
          name: noip-monitoring
  # Allow traffic from ingress controllers
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
  # Allow traffic from system namespaces
  - from:
    - namespaceSelector:
        matchLabels:
          name: kube-system
  ports:
  - protocol: TCP
    port: 3000
  - protocol: TCP
    port: 9090
  egress:
  # Allow DNS resolution
  - to: []
    ports:
    - protocol: UDP
      port: 53
  # Allow traffic to Kubernetes API
  - to: []
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 6443
  # Allow traffic to external services (HTTP/HTTPS)
  - to: []
    ports:
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 443

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mongodb-network-policy
  namespace: noip-production
  labels:
    app: mongodb
    component: database
spec:
  podSelector:
    matchLabels:
      app: mongodb
  policyTypes:
  - Ingress
  ingress:
  # Only allow traffic from NOIP platform services
  - from:
    - podSelector:
        matchLabels:
          app: noip-platform
    - namespaceSelector:
        matchLabels:
          name: noip-monitoring
  ports:
  - protocol: TCP
    port: 27017

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-network-policy
  namespace: noip-production
  labels:
    app: redis
    component: database
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
  - Ingress
  ingress:
  # Only allow traffic from NOIP platform services
  - from:
    - podSelector:
        matchLabels:
          app: noip-platform
    - namespaceSelector:
        matchLabels:
          name: noip-monitoring
  ports:
  - protocol: TCP
    port: 6379

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-network-policy
  namespace: noip-monitoring
  labels:
    app: monitoring
    component: observability
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow traffic from monitoring namespace
  - from:
    - namespaceSelector:
        matchLabels:
          name: noip-monitoring
  # Allow traffic from application namespaces for metrics scraping
  - from:
    - namespaceSelector:
        matchLabels:
          name: noip-production
    - namespaceSelector:
        matchLabels:
          name: noip-staging
  # Allow traffic from system namespaces
  - from:
    - namespaceSelector:
        matchLabels:
          name: kube-system
  ports:
  - protocol: TCP
    port: 9090  # Prometheus
  - protocol: TCP
    port: 3000  # Grafana
  - protocol: TCP
    port: 8080  # Custom metrics
  egress:
  # Allow DNS resolution
  - to: []
    ports:
    - protocol: UDP
      port: 53
  # Allow outbound to application namespaces for service discovery
  - to:
    - namespaceSelector:
        matchLabels:
          name: noip-production
    - namespaceSelector:
        matchLabels:
          name: noip-staging
    ports:
    - protocol: TCP
      port: 3000
      port: 8080