---
# NOIP Platform Secrets (TEMPLATE)
#
# This file documents the secret keys each component expects. It intentionally
# contains NO secret values: committing secrets (even base64-encoded, which is
# encoding not encryption) to source control is unsafe.
#
# Populate values at deploy time via one of:
#   - Sealed Secrets (bitnami-labs/sealed-secrets)
#   - External Secrets Operator (sourcing from Vault / cloud secret managers)
#   - `kubectl create secret ... --from-literal=...` in a controlled pipeline
#
# The empty values below are placeholders; overlays/operators inject the real
# data. Keeping keys here gives reviewers a single source of expected secrets.

apiVersion: v1
kind: Secret
metadata:
  name: noip-platform-secrets
  namespace: noip-production
  labels:
    app: noip-platform
    component: secrets
  annotations:
    description: "NOIP Platform Production Secrets"
    managed-by: "external-secrets"
type: Opaque
data:
  mongodb-uri: ""
  redis-url: ""
  jwt-secret: ""
  bcrypt-salt: ""
  email-service-api-key: ""
  ai-service-api-key: ""
  prometheus-remote-write-url: ""
  prometheus-remote-write-token: ""
  tls-ca-cert: ""
  tls-client-cert: ""
  tls-client-key: ""

---
apiVersion: v1
kind: Secret
metadata:
  name: noip-platform-staging-secrets
  namespace: noip-staging
  labels:
    app: noip-platform
    component: secrets
  annotations:
    description: "NOIP Platform Staging Secrets"
    managed-by: "external-secrets"
type: Opaque
data:
  mongodb-uri: ""
  redis-url: ""
  jwt-secret: ""
  bcrypt-salt: ""
  email-service-api-key: ""
  ai-service-api-key: ""
  prometheus-remote-write-url: ""
  prometheus-remote-write-token: ""

---
# TLS Certificate Secret (for Ingress)
apiVersion: v1
kind: Secret
metadata:
  name: noip-platform-tls
  namespace: noip-production
  labels:
    app: noip-platform
    component: tls
  annotations:
    description: "NOIP Platform TLS Certificate"
type: kubernetes.io/tls
data:
  tls.crt: ""
  tls.key: ""

---
# Image Pull Secret (for private registries)
apiVersion: v1
kind: Secret
metadata:
  name: noip-platform-registry-secret
  namespace: noip-production
  labels:
    app: noip-platform
    component: registry
  annotations:
    description: "NOIP Platform Container Registry Credentials"
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: ""
