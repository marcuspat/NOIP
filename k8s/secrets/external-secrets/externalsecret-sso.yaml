# SSO client secrets (ADR-0025, per-provider rotation).
#
# Rotation cadence depends on the upstream IdP. Update the secret in
# Vault / AWS SM and let ESO sync; the application supports SSO client
# secret rotation without a redeploy via the identity provider adapter.
#
# Vault layout:
#   noip/data/production/sso/google   -> { client_id, client_secret }
#   noip/data/production/sso/okta     -> { client_id, client_secret }
#   noip/data/production/sso/github   -> { client_id, client_secret }
# AWS SM layout: noip/production/sso/<provider> -> { client_id, client_secret }
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: noip-sso-google
  namespace: noip-production
  labels:
    app: noip-platform
    component: secrets
    rotation-cadence: "provider-defined"
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: noip-vault-store
    kind: SecretStore
  target:
    name: noip-sso-google-secret
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        SSO_GOOGLE_CLIENT_ID: "{{ .clientId }}"
        SSO_GOOGLE_CLIENT_SECRET: "{{ .clientSecret }}"
  data:
    - secretKey: clientId
      remoteRef:
        key: production/sso/google
        property: client_id
    - secretKey: clientSecret
      remoteRef:
        key: production/sso/google
        property: client_secret
---
