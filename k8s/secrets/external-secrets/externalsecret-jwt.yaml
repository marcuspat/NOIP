# JWT signing secret (ADR-0025, 90-day rotation).
#
# The target Secret carries both the active signing key (`JWT_SECRET` +
# `JWT_ACTIVE_KID`) and the prior-kid window (`JWT_PRIOR_KIDS`, parsed by
# `src/utils/auth/jwt-key-rotation.ts:loadJwtKeySet`). The window keeps
# tokens signed by the previous secret verifying until they age out
# (15 min for access, 7d for refresh by default).
#
# Vault layout (noip-vault-store):
#   noip/data/production/jwt/secret     -> { secret, kid, prior }
#
# AWS Secrets Manager layout (noip-aws-store):
#   noip/production/jwt/secret          -> { secret, kid, prior }
#   where `prior` is the literal string "kid-1700000000:..,kid-1700001000:.."
#
# Pick the matching `secretStoreRef` for your environment; one of the two
# `dataFrom` blocks below should be commented out at apply time.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: noip-jwt
  namespace: noip-production
  labels:
    app: noip-platform
    component: secrets
    rotation-cadence: "90d"
spec:
  refreshInterval: "10m"
  # Swap to `noip-aws-store` on EKS clusters.
  secretStoreRef:
    name: noip-vault-store
    kind: SecretStore
  target:
    name: noip-jwt-secret
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        JWT_SECRET: "{{ .secret }}"
        JWT_ACTIVE_KID: "{{ .kid }}"
        # Empty string allowed; parser tolerates it via loadJwtKeySet.
        JWT_PRIOR_KIDS: "{{ .prior }}"
  data:
    - secretKey: secret
      remoteRef:
        key: production/jwt/secret
        property: secret
    - secretKey: kid
      remoteRef:
        key: production/jwt/secret
        property: kid
    - secretKey: prior
      remoteRef:
        key: production/jwt/secret
        property: prior
