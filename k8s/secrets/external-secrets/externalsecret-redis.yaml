# Redis password (ADR-0025, 90-day rotation).
#
# Rotation mirrors the MongoDB flow (see externalsecret-mongodb.yaml).
# Use a brief overlap window where both the old and new password are
# accepted on the Redis side (`AUTH` lists), then ESO sync, rolling
# restart, then revoke old.
#
# Vault layout: noip/data/production/redis -> { password }
# AWS SM layout: noip/production/redis     -> { password }
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: noip-redis
  namespace: noip-production
  labels:
    app: noip-platform
    component: secrets
    rotation-cadence: "90d"
spec:
  refreshInterval: "10m"
  secretStoreRef:
    name: noip-vault-store
    kind: SecretStore
  target:
    name: noip-redis-secret
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        REDIS_PASSWORD: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: production/redis
        property: password
