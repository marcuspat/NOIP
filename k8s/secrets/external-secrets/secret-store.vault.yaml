# SecretStore — HashiCorp Vault (KV v2)
#
# Keep this file when the cluster is paired with a Vault deployment.
# Use the AWS sibling (`secret-store.aws.yaml`) instead when running on
# AWS without Vault.
#
# Authentication uses Kubernetes auth method: ESO exchanges the operator's
# ServiceAccount token for a short-lived Vault token, which is bound to a
# Vault role with read-only access to the `noip/data/production/*` path.
#
# The role must be created in Vault out-of-band, e.g.:
#   vault write auth/kubernetes/role/noip-eso \
#       bound_service_account_names=external-secrets \
#       bound_service_account_namespaces=external-secrets-system \
#       policies=noip-read \
#       ttl=10m
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: noip-vault-store
  namespace: noip-production
  labels:
    app: noip-platform
    component: secrets
spec:
  provider:
    vault:
      # Vault address — typically a ClusterIP service in the same cluster
      # or a private endpoint reachable from the operator pod.
      server: "https://vault.vault-system.svc.cluster.local:8200"
      path: "noip"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "noip-eso"
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets-system
      # CA cert for Vault's TLS listener. Provided by cert-manager.
      caProvider:
        type: "ConfigMap"
        name: "vault-ca"
        key: "ca.crt"
        namespace: noip-production
