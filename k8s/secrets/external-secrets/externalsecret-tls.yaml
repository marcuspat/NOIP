# mTLS server certificate + private key (ADR-0025, 90-day rotation).
#
# In a production cluster cert-manager generally drives cert rotation
# directly. This ExternalSecret is the fallback when certs are minted
# outside the cluster (e.g. by an HSM-backed CA) and stored in Vault /
# AWS SM as PEM blobs. The target Secret uses the kubernetes.io/tls
# type so Ingress / mesh sidecars can consume it directly.
#
# Vault layout: noip/data/production/tls -> { cert, key }
# AWS SM layout: noip/production/tls     -> { cert, key }
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: noip-tls
  namespace: noip-production
  labels:
    app: noip-platform
    component: secrets
    rotation-cadence: "90d"
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: noip-vault-store
    kind: SecretStore
  target:
    name: noip-tls-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
      data:
        tls.crt: "{{ .cert }}"
        tls.key: "{{ .key }}"
  data:
    - secretKey: cert
      remoteRef:
        key: production/tls
        property: cert
    - secretKey: key
      remoteRef:
        key: production/tls
        property: key
