# Anthropic AI API key (ADR-0025, 180-day rotation).
#
# Rotation: mint a new key from the Anthropic console, write it under
# `production/ai/api-key`, wait for ESO sync, rolling restart, revoke
# the previous key. Startup validation (src/config/validation.ts)
# refuses an empty key in production when `AI_SERVICE_ENABLED` is on.
#
# Vault layout: noip/data/production/ai -> { api-key }
# AWS SM layout: noip/production/ai     -> { api-key }
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: noip-ai-api-key
  namespace: noip-production
  labels:
    app: noip-platform
    component: secrets
    rotation-cadence: "180d"
spec:
  refreshInterval: "10m"
  secretStoreRef:
    name: noip-vault-store
    kind: SecretStore
  target:
    name: noip-ai-secret
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        AI_API_KEY: "{{ .apiKey }}"
  data:
    - secretKey: apiKey
      remoteRef:
        key: production/ai
        property: api-key
