# MongoDB connection URI (ADR-0025, 90-day rotation).
#
# Rotation procedure (per ADR-0025):
#   1. Create a new user / password in MongoDB.
#   2. Update the secret in Vault / AWS SM.
#   3. ESO syncs within `refreshInterval`.
#   4. Rolling-restart the deployments that read this Secret (helm
#      `--recreate-pods` or `kubectl rollout restart deploy/noip-platform`).
#   5. Revoke the old user once the rollout completes.
#
# Vault layout: noip/data/production/mongodb -> { uri }
# AWS SM layout: noip/production/mongodb     -> { uri }
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: noip-mongodb
  namespace: noip-production
  labels:
    app: noip-platform
    component: secrets
    rotation-cadence: "90d"
spec:
  refreshInterval: "10m"
  secretStoreRef:
    name: noip-vault-store
    kind: SecretStore
  target:
    name: noip-mongodb-secret
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        MONGODB_URI: "{{ .uri }}"
  data:
    - secretKey: uri
      remoteRef:
        key: production/mongodb
        property: uri
