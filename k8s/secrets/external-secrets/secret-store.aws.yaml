# SecretStore — AWS Secrets Manager
#
# Keep this file when the cluster runs on EKS with IAM Roles for Service
# Accounts (IRSA). Use the Vault sibling (`secret-store.vault.yaml`)
# instead when Vault is the system of record.
#
# Authentication: the ESO ServiceAccount is annotated with an IAM role
# that has `secretsmanager:GetSecretValue` + `secretsmanager:DescribeSecret`
# on `arn:aws:secretsmanager:<region>:<acct>:secret:noip/production/*`.
#
# Create the IAM role and annotate the ServiceAccount, e.g.:
#   eksctl create iamserviceaccount \
#       --name external-secrets --namespace external-secrets-system \
#       --cluster noip-prod \
#       --attach-policy-arn arn:aws:iam::<acct>:policy/NoipEsoRead \
#       --approve
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: noip-aws-store
  namespace: noip-production
  labels:
    app: noip-platform
    component: secrets
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        # IRSA: the operator's ServiceAccount carries the IAM role
        # annotation, so no static credentials live in the cluster.
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets-system
