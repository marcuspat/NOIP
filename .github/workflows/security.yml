name: Security Scanning & Compliance

# Workflow disabled: automatic triggers removed, manual dispatch only.
on:
  workflow_dispatch:

env:
  SCAN_TIMEOUT: 300

jobs:
  # === CONTAINER SECURITY SCANNING ===
  container-security:
    name: Container Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker image for scanning
      run: |
        docker build -t noip-platform:scan .

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'noip-platform:scan'
        format: 'sarif'
        output: 'trivy-results.sarif'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Run Grype vulnerability scanner
      uses: anchore/scan-action@v4
      with:
        image: 'noip-platform:scan'
        fail-build: false
        format: 'sarif'
        output-file: 'grype-results.sarif'

    - name: Upload Grype scan results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'grype-results.sarif'

  # === INFRASTRUCTURE SECURITY SCANNING ===
  infrastructure-security:
    name: Infrastructure Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python for security tools
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install security scanning tools
      run: |
        pip install checkov
        pip install tfsec
        pip install kube-score

    - name: Scan Kubernetes manifests with kube-score
      run: |
        # Score Kubernetes manifests
        kube-score score k8s/**/*.yaml --output-format ci --exit-one-on-warning

    - name: Run Checkov on IaC files
      run: |
        # Scan Terraform, CloudFormation, Kubernetes files
        checkov --directory . --framework kubernetes --skip-check CKV_K8S_38
        checkov --directory . --framework dockerfile

    - name: Generate security posture report
      run: |
        cat > security-posture.md << EOF
        # Infrastructure Security Posture Report

        **Scan Date:** $(date -u +"%Y-%m-%dT%H:%M:%SZ")
        **Scanner Versions:**
        - kube-score: $(kube-score version)
        - checkov: $(checkov --version)

        ## Findings Summary
        - Kubernetes Manifests: Scanned ✅
        - Dockerfiles: Scanned ✅
        - IaC Files: Scanned ✅

        ## Recommendations
        - Review and fix any failed security checks
        - Implement network policies for all namespaces
        - Use non-root containers across all deployments
        - Enable security contexts for all pods
        - Implement resource quotas and limits
        EOF

    - name: Upload security posture report
      uses: actions/upload-artifact@v3
      with:
        name: security-posture-report
        path: security-posture.md

  # === DEPENDENCY SECURITY SCANNING ===
  dependency-security:
    name: Dependency Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run npm audit
      run: |
        npm audit --audit-level=moderate --json > npm-audit.json || true
        cat npm-audit.json

    - name: Run Snyk dependency scan
      uses: snyk/actions/node@master
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=medium --json > snyk-report.json || true

    - name: Run OWASP Dependency Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: 'noip-platform'
        path: '.'
        format: 'HTML'
        out: 'dependency-check-report'

    - name: Upload dependency check reports
      uses: actions/upload-artifact@v3
      with:
        name: dependency-security-reports
        path: |
          npm-audit.json
          snyk-report.json
          dependency-check-report/

  # === CODE SECURITY ANALYSIS ===
  code-security:
    name: Code Security Analysis
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: javascript

    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

    - name: Run ESLint security rules
      run: |
        npx eslint src/ --ext .ts,.js --config .eslintrc.js --format=json --output-file=eslint-security.json || true

    - name: Run SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    - name: Upload code security reports
      uses: actions/upload-artifact@v3
      with:
        name: code-security-reports
        path: |
          eslint-security.json

  # === SECRETS SCANNING ===
  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for better secrets detection

    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

    - name: Run TruffleHog OSS
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD
        extra_args: --debug --json

    - name: Scan for AWS credentials
      run: |
        # Simple regex scan for AWS access keys
        if grep -r "(?i)(aws_access_key_id|aws_secret_access_key|AKIA[0-9A-Z]{16})" . --exclude-dir=.git --exclude-dir=node_modules; then
          echo "⚠️ Potential AWS credentials found!"
          exit 1
        else
          echo "✅ No AWS credentials detected"
        fi

  # === COMPLIANCE CHECKS ===
  compliance:
    name: Compliance Validation
    runs-on: ubuntu-latest
    needs: [container-security, infrastructure-security, dependency-security, code-security, secrets-scan]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Generate compliance report
      run: |
        cat > compliance-report.md << EOF
        # NOIP Platform Compliance Report

        **Generated:** $(date -u +"%Y-%m-%dT%H:%M:%SZ")
        **Framework:** SOC2 Type II / ISO27001

        ## Security Scan Results

        ### Container Security
        - Status: ${{ needs.container-security.result == 'success' && '✅ PASS' || '❌ FAIL' }}
        - Scanner: Trivy, Grype
        - Critical/High Vulnerabilities: ${{ needs.container-security.result == 'success' && 'None' || 'Requires Review' }}

        ### Infrastructure Security
        - Status: ${{ needs.infrastructure-security.result == 'success' && '✅ PASS' || '❌ FAIL' }}
        - Scanners: kube-score, checkov
        - IaC Compliance: ${{ needs.infrastructure-security.result == 'success' && 'Compliant' || 'Non-Compliant' }}

        ### Dependency Security
        - Status: ${{ needs.dependency-security.result == 'success' && '✅ PASS' || '❌ FAIL' }}
        - Scanners: npm audit, Snyk, OWASP Dependency Check
        - Vulnerable Dependencies: ${{ needs.dependency-security.result == 'success' && 'Acceptable' || 'Requires Updates' }}

        ### Code Security
        - Status: ${{ needs.code-security.result == 'success' && '✅ PASS' || '❌ FAIL' }}
        - Scanners: CodeQL, ESLint Security, SonarCloud
        - Security Hotspots: ${{ needs.code-security.result == 'success' && 'None Critical' || 'Review Required' }}

        ### Secrets Detection
        - Status: ${{ needs.secrets-scan.result == 'success' && '✅ PASS' || '❌ FAIL' }}
        - Scanners: Gitleaks, TruffleHog
        - Exposed Secrets: ${{ needs.secrets-scan.result == 'success' && 'None' || 'IMMEDIATE ACTION REQUIRED' }}

        ## Overall Compliance Status
        **Status:** ${{
          needs.container-security.result == 'success' &&
          needs.infrastructure-security.result == 'success' &&
          needs.dependency-security.result == 'success' &&
          needs.code-security.result == 'success' &&
          needs.secrets-scan.result == 'success' &&
          '✅ COMPLIANT' || '❌ NON-COMPLIANT'
        }}

        ## Recommendations
        1. Review and address any failing security scans
        2. Update vulnerable dependencies immediately
        3. Rotate any exposed credentials
        4. Implement security policies and procedures
        5. Schedule regular security reviews

        ## Next Steps
        - Remediate identified security issues
        - Update security policies
        - Schedule follow-up scans
        - Document remediation efforts
        EOF

    - name: Upload compliance report
      uses: actions/upload-artifact@v3
      with:
        name: compliance-report
        path: compliance-report.md

    - name: Comment PR with compliance status
      if: github.event_name == 'push'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('compliance-report.md', 'utf8');

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: report
          })

  # === SECURITY NOTIFICATIONS ===
  notify-security:
    name: Security Notifications
    runs-on: ubuntu-latest
    needs: [compliance]
    if: failure()

    steps:
    - name: Notify security team on failures
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        channel: '#security-alerts'
        text: |
          🚨 SECURITY SCAN FAILURES DETECTED

          **Repository:** NOIP Platform
          **Commit:** ${{ github.sha }}
          **Branch:** ${{ github.ref_name }}
          **Time:** $(date -u +"%Y-%m-%dT%H:%M:%SZ")

          **Failed Jobs:**
          - Container Security: ${{ needs.container-security.result }}
          - Infrastructure Security: ${{ needs.infrastructure-security.result }}
          - Dependency Security: ${{ needs.dependency-security.result }}
          - Code Security: ${{ needs.code-security.result }}
          - Secrets Detection: ${{ needs.secrets-scan.result }}

          **Action Required:**
          1. Review scan results in GitHub Actions
          2. Identify and remediate security issues
          3. Update security policies as needed
          4. Document remediation efforts

          🔗 [View Results](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SECURITY_SLACK_WEBHOOK_URL }}

    - name: Create security issue for critical findings
      if: contains(needs.container-security.result, 'failure') || contains(needs.secrets-scan.result, 'failure')
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '🚨 Critical Security Issues Detected',
            body: `
          **Security Scan Failures - Immediate Action Required**

          **Commit:** ${{ github.sha }}
          **Time:** $(date -u +"%Y-%m-%dT%H:%M:%SZ")

          **Critical Findings:**
          - Container Security: ${{ needs.container-security.result }}
          - Secrets Detection: ${{ needs.secrets-scan.result }}

          **Immediate Actions Required:**
          1. 🔍 Review detailed scan results
          2. 🚨 Address critical vulnerabilities
          3. 🔄 Rotate any exposed credentials
          4. 📋 Document remediation steps

          **Next Steps:**
          - Review the GitHub Actions run for detailed findings
          - Implement remediation immediately
          - Update security policies and procedures
          - Schedule follow-up scans

          [View Security Scan Results](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          `,
            labels: ['security', 'critical', 'immediate-action'],
            assignees: ['security-team-lead']  // Update with actual username
          })